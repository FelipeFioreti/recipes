<div class="sidebar" [class.close]="!menuOpen()">
    <div class="logo-details">
        <div class="logo">
            <fa-icon [icon]="'utensils'" class="sidebar-icon"></fa-icon>
        </div>
        <fa-icon [icon]="'bars'" id="btn" class="sidebar-icon sidebar-toggle" (click)="toggleMenu()"></fa-icon>
    </div>
    <ul class="nav-links">
        @for (item of navigation(); track item.label) {
            <li [class.showMenu]="isSubMenuOpen(item.label)">
                <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                    <fa-icon [icon]="item.icon" class="sidebar-icon" [fixedWidth]="true"></fa-icon>
                    <span class="link_name">{{ item.label }}</span>
                </a>

            </li>
        }

        <li>
            <div class="profile-details">
                <div class="profile-content">
                    <span class="profile-initials">{{ authService.getDisplayName()?.slice(0, 1) }}</span>
                </div>
                <div class="name-job">
                    <div class="profile_name">{{ authService.getDisplayName() }}</div>
                    <div class="job">{{ authService.isAdmin() ? 'Administrador' : 'Usuário' }}</div>
                </div>
                <fa-icon [icon]="'right-from-bracket'" class="sidebar-icon sidebar-signout" (click)="signOut()"></fa-icon>
            </div>
        </li>

    </ul>
</div>

<section class="home-section">
    <main class="shell-content px-3 px-lg-4 py-3">
        <router-outlet></router-outlet>
    </main>
</section>
