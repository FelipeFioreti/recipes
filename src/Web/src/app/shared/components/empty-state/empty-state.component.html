<section class="empty-state section-card stagger-in">
  <div class="empty-state__mark">AR</div>
  <h2>{{ title() }}</h2>
  <p>{{ description() }}</p>

  @if (actionLabel()) {
    <button type="button" class="button button-primary" (click)="triggerAction()">
      {{ actionLabel() }}
    </button>
  }
</section>
