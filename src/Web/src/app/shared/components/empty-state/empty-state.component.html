<section class="card border-0 shadow-sm stagger-in">
  <div class="card-body d-grid gap-3">
    <div class="empty-state__mark">AR</div>
    <h2>{{ title() }}</h2>
    <p class="mb-0 text-body-secondary">{{ description() }}</p>

    @if (actionLabel()) {
      <div>
        <button type="button" class="btn btn-primary" (click)="triggerAction()">
          {{ actionLabel() }}
        </button>
      </div>
    }
  </div>
</section>
