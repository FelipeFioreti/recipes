<header class="card border-0 shadow-sm stagger-in">
    <div class="card-body d-flex flex-column flex-lg-row align-items-start justify-content-between gap-3">
        <div class="page-header-copy d-grid gap-3">
            <span class="eyebrow">{{ eyebrow() }}</span>
            <h1>{{ title() }}</h1>
            @if (description()) {
                <p class="mb-0 text-body-secondary">{{ description() }}</p>
            }
        </div>

        <div class="d-flex flex-wrap align-items-center gap-2">
            <ng-content select="[page-actions]"></ng-content>
        </div>
    </div>
</header>
