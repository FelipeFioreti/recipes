<article class="card border-0 shadow-sm stagger-in recipe-card" [class.recipe-card--selected]="selected()">
  <div class="card-body d-grid gap-3">
    <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
      <div class="d-flex flex-wrap gap-2">
        <span class="badge rounded-pill app-badge-accent">{{ categoryName() }}</span>
      @if (recipe().deletedAt) {
          <span class="badge rounded-pill app-badge-muted">Arquivada</span>
      }
      </div>

      <small class="text-body-secondary">Atualizada em {{ recipe().updatedAt | date: 'dd/MM/yyyy' }}</small>
    </div>

    <div class="d-grid gap-2">
      <h3>{{ recipe().name }}</h3>
      <p class="mb-0 text-body-secondary">{{ recipe().description || 'Sem descricao adicional.' }}</p>
    </div>

    <div class="d-flex flex-column flex-sm-row justify-content-between gap-2">
      <button type="button" class="btn btn-outline-secondary" (click)="edit()">Editar</button>
      <button type="button" class="btn btn-outline-secondary" [disabled]="!!recipe().deletedAt" (click)="remove()">
        {{ recipe().deletedAt ? 'Arquivada' : 'Arquivar' }}
      </button>
    </div>
  </div>
</article>
