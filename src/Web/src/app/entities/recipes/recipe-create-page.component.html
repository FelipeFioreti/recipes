<div class="d-grid gap-4">
  <app-page-header
    eyebrow="Receitas"
    title="Adicionar receita"
    description="Preencha os dados para cadastrar uma nova receita.">
    <div page-actions>
      <a routerLink="/app/recipes" class="btn btn-outline-secondary">Voltar para listagem</a>
    </div>
  </app-page-header>

  <section class="card border-0 shadow-sm">
    <div class="card-body">
      <form class="d-grid gap-3" [formGroup]="form" (ngSubmit)="saveRecipe()">
        <div>
          <label class="form-label" for="name">Nome</label>
          <input id="name" type="text" class="form-control" formControlName="name"/>
        </div>

        <div>
          <label class="form-label" for="description">Descricao</label>
          <textarea id="description" class="form-control" rows="4" formControlName="description"></textarea>
        </div>

        <div>
          <label class="form-label" for="recipeTypeId">Tipo de receita</label>
          <select id="recipeTypeId" class="form-select" formControlName="recipeTypeId">
            <option [value]="0">Selecione</option>
            @for (recipeType of recipeTypes(); track recipeType.id) {
              <option [value]="recipeType.id">{{ recipeType.name }}</option>
            }
          </select>
        </div>

        @if (categoriesUnavailableMessage()) {
          <div class="alert alert-warning mb-0">{{ categoriesUnavailableMessage() }}</div>
        }

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="saving() || loadingTypes()">
            {{ saving() ? 'Salvando...' : 'Salvar receita' }}
          </button>
          <a routerLink="/app/recipes" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </section>
</div>
