<div class="row justify-content-center">
  <div class="col-12" *ngIf="city">

    <div class="card-header">
      <span jhiTranslate="city.detail.title"></span>
    </div>

    <div class="card-body">
      <div class="row justify-content-center">

        <ngb-accordion class="col-12 entity-details" activeIds="panelEntity">
          <ngb-panel id="panelEntity">
            <ng-template ngbPanelTitle>
              <fa-icon fixedWidth="true" icon="list-alt"></fa-icon>
              &nbsp;
              <span>{{ 'entity.panels.details' | translate }}</span>
            </ng-template>
            <ng-template ngbPanelContent>
              <div class="row justify-content-center">
                <dl class="col-12">
                  <dt><span jhiTranslate="global.field.title"></span></dt>
                  <dd><span>{{ city.name }}</span></dd>
                  <dt><span jhiTranslate="city.state"></span></dt>
                  <dd>
                    <app-view-route-link [entity]="city.state" route="loc/states" target="_blank"></app-view-route-link>
                  </dd>
                </dl>
              </div>
            </ng-template>
          </ngb-panel>
          <ngb-panel id="panelAudit">
            <ng-template ngbPanelTitle>
              <fa-icon fixedWidth="true" icon="exclamation-circle"></fa-icon>
              &nbsp;
              <span>{{ 'entity.panels.audit' | translate }}</span>
            </ng-template>
            <ng-template ngbPanelContent>
              <div class="row justify-content-center">
                <dl class="col-12">
                  <dt><span jhiTranslate="global.field.uuid"></span></dt>
                  <dd>{{ city.uuid }}</dd>
                  <dt><span jhiTranslate="global.field.active"></span></dt>
                  <dd>
                    <app-bool-icon [value]="city.active"></app-bool-icon>
                  </dd>
                  <dt><span jhiTranslate="global.field.createdBy"></span></dt>
                  <dd>{{ city.createdBy }}</dd>
                  <dt><span jhiTranslate="global.field.createdDate"></span></dt>
                  <dd>{{ city.createdDate | date:'dd/MM/yyyy HH:mm' }}</dd>
                  <dt><span jhiTranslate="global.field.lastModifiedBy"></span></dt>
                  <dd>{{ city.lastModifiedBy }}</dd>
                  <dt><span jhiTranslate="global.field.lastModifiedDate"></span></dt>
                  <dd>{{ city.lastModifiedDate | date:'dd/MM/yyyy HH:mm' }}</dd>
                </dl>
              </div>
            </ng-template>
          </ngb-panel>
        </ngb-accordion>
      </div>
    </div>
  </div>
</div>
