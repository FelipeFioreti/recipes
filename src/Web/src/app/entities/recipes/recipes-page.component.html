<div class="d-grid gap-4">
  <app-page-header
    eyebrow="Catalogo"
    title="Gerencie receitas com contexto visual"
    description="Acompanhe o acervo, filtre pelo que importa e edite cada preparo em um painel lateral pensado para reduzir atrito.">
    <div page-actions>
      <button type="button" class="btn btn-primary" (click)="startCreate()">Nova receita</button>
    </div>
  </app-page-header>

  <section class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-3">
    <div class="col">
      <app-stat-card
        label="Receitas ativas"
        [value]="activeRecipesCount().toString()"
        helper="Itens prontos para consulta e operacao"
        tone="accent" />
    </div>
    <div class="col">
      <app-stat-card
        label="Arquivadas"
        [value]="archivedRecipesCount().toString()"
        helper="Historico preservado para referencia"
        tone="neutral" />
    </div>
    <div class="col">
      <app-stat-card
        label="Atualizadas na semana"
        [value]="recentRecipesCount().toString()"
        helper="Indicador rapido de movimento recente"
        tone="success" />
    </div>
  </section>

  <section class="card border-0 shadow-sm stagger-in">
    <div class="card-body d-flex flex-column flex-lg-row align-items-lg-end justify-content-between gap-3">
      <div class="flex-grow-1">
        <label class="form-label" for="search">Buscar receitas</label>
        <input
          id="search"
          type="search"
          class="form-control"
          [value]="searchTerm()"
          (input)="updateSearchTerm(($any($event.target)).value)"
          placeholder="Procure por nome, tecnica ou descricao" />
      </div>

      <div class="d-flex flex-wrap gap-2">
        <span class="badge rounded-pill app-badge-accent">{{ filteredRecipes().length }} resultado(s)</span>
        <span class="badge rounded-pill app-badge-muted">{{ recipeTypes().length }} categoria(s) ativa(s)</span>
      </div>
    </div>
  </section>

  <div class="row g-4 align-items-start">
    <div class="col-12 col-xl-7">
      <section class="d-grid gap-3">
      @if (loading()) {
          <section class="card border-0 shadow-sm">
            <div class="card-body">
              <p class="mb-0">Carregando receitas...</p>
            </div>
        </section>
      } @else if (filteredRecipes().length > 0) {
        @for (recipe of filteredRecipes(); track recipe.id) {
          <app-recipe-card
            [recipe]="recipe"
            [categoryName]="categoryName(recipe.recipeTypeId)"
            [selected]="selectedRecipeId() === recipe.id"
            (editRequested)="startEdit(recipe)"
            (deleteRequested)="archiveRecipe(recipe)" />
        }
      } @else {
        <app-empty-state
          title="Nenhuma receita encontrada"
          description="Comece criando uma nova receita ou ajuste sua busca para localizar preparos ja cadastrados."
          actionLabel="Criar receita"
          (actionTriggered)="startCreate()" />
      }
      </section>
    </div>

    <div class="col-12 col-xl-5">
      <app-recipe-editor
        [form]="form"
        [recipeTypes]="recipeTypes()"
        [saving]="saving()"
        [mode]="mode()"
        [categoriesUnavailableMessage]="categoriesUnavailableMessage()"
        (submitted)="saveRecipe()"
        (canceled)="startCreate()" />
    </div>
  </div>
</div>
