@if (recipe(); as recipeRef) {
    <div class="entity-page">
        <app-page-header
                [eyebrow]="'global.menu.recipes' | translate"
                [title]="'recipe.detail.title' | translate">
            <button
                    type="button"
                    ngProjectAs="[page-actions]"
                    class="btn btn-primary d-inline-flex align-items-center gap-2 px-3"
                    [routerLink]="['/app/recipes', recipeRef.id, 'edit']">
                <fa-icon icon="pencil-alt"></fa-icon>
                <span>{{ 'entity.action.edit' | translate }}</span>
            </button>

            <button
                    type="button"
                    ngProjectAs="[page-actions]"
                    class="btn btn-outline-secondary d-inline-flex align-items-center gap-2 px-3"
                    (click)="previousState()">
                <fa-icon icon="arrow-left"></fa-icon>
                <span>{{ 'entity.action.back' | translate }}</span>
            </button>
        </app-page-header>

        <section class="entity-card entity-card-hero">
            <div class="d-grid gap-4">
                <div class="d-flex flex-column flex-xl-row align-items-start justify-content-between gap-3">
                    <div class="d-grid gap-2">
                        <h2>{{ recipeRef.name }}</h2>
                    </div>

                    <div class="entity-pill">
                        {{ recipeRef.category?.name || 'Categoria nao informada' }}
                    </div>
                </div>

                <div class="entity-detail-grid">

                    <article class="entity-detail-item entity-detail-item-full">
                        <span class="entity-detail-item-label">{{ 'recipe.description' | translate }}</span>
                        <div class="entity-detail-item-value entity-detail-item-value-body">
                            {{ recipeRef.description || 'Essa receita ainda nao possui descricao cadastrada.' }}
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <app-entity-audit-accordion [entity]="recipeRef" [collapsed]="false"></app-entity-audit-accordion>
    </div>
}
