<div class="row justify-content-center">
    <div class="card-body">
        <div class="table-responsive">
            @if (recipes()) {
                <table class="table table-hover">
                    <thead class="thead-light">
                    <tr>
                        <th scope="col">
                            <span>{{ 'global.field.name' | translate }}</span>
                        </th>
                        <th scope="col"></th>
                    </tr>
                    </thead>
                    <tbody>

                        @for (recipe of recipes(); track recipe.Id) {

                            <tr [class.notActive]="!recipe.DeletedAt">

                                <td>{{ recipe.Name }}</td>

                                <td class="text-right">

                                    <div class="btn-group">

                                        <button type="button"
                                                title="{{ 'entity.action.edit' | translate }}"
                                                (click)="goToEdit(recipe)"
                                                class="btn btn-default btn-sm">
                                            <fa-icon icon="edit" [fixedWidth]="true"></fa-icon>
                                        </button>

                                        <div class="btn-group"
                                             ngbDropdown
                                             role="group"
                                             container="body"
                                             placement="left-top">

                                            <button
                                                    class="btn btn-default btn-sm dropdown-toggle-split"
                                                    ngbDropdownToggle>
                                            </button>

                                            <div class="dropdown-menu" ngbDropdownMenu>

                                                <a class="dropdown-item" (click)="goToView(recipe)">
                                                    <fa-icon [fixedWidth]="true" icon="list-alt"></fa-icon>
                                                    &nbsp;
                                                    <span>{{ 'entity.action.view' | translate }}</span>
                                                </a>

                                                <div class="dropdown-divider"></div>

                                                <a class="dropdown-item" (click)="delete(recipe)">
                                                    <fa-icon [fixedWidth]="true" icon="times"></fa-icon>
                                                    &nbsp;
                                                    <span>{{ 'entity.action.delete' | translate }}</span>
                                                </a>

                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>

                        } @empty {

                            <tr>
                                <td colspan="3" class="text-center">
                                    {{ 'recipe.notFound' | translate }}
                                </td>
                            </tr>
                        }

                    </tbody>
                </table>
            }
        </div>
    </div>
</div>
