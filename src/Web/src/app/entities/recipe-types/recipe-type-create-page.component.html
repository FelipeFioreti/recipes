<div class="d-grid gap-4">
  <app-page-header
    eyebrow="Tipos"
    title="Adicionar tipo de receita"
    description="Preencha os dados para cadastrar um novo tipo.">
    <div page-actions>
      <a routerLink="/app/recipe-types" class="btn btn-outline-secondary">Voltar para listagem</a>
    </div>
  </app-page-header>

  <section class="card border-0 shadow-sm">
    <div class="card-body">
      <form class="d-grid gap-3" [formGroup]="form" (ngSubmit)="saveRecipeType()">
        <div>
          <label class="form-label" for="name">Nome</label>
          <input id="name" type="text" class="form-control" formControlName="name"/>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="saving()">
            {{ saving() ? 'Salvando...' : 'Salvar tipo' }}
          </button>
          <a routerLink="/app/recipe-types" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </section>
</div>
